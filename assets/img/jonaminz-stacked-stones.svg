<!--
檔案位置：jonaminz/assets/img/jonaminz-stacked-stones.svg
時間戳：2026-07-13 10:58 UTC+8
用途：Jonaminz 獨立疊石元件；四顆石頭與地面乾刷皆為可單獨動畫的向量群組。

2026-07-13 大幅改版歷程（由舊到新）：
1. 平滑漸層＋模糊斑塊模擬石頭質感——使用者回饋斑塊看起來像「瘀青」。
2. 改用角度分面低多邊形，但單一中心點放射切面——像洋傘/沙灘球。
3. 改用兩個不對稱內部頂點，方向確認但切面數太少、太粗糙。
4. 三個內部頂點、12 切面、高光窄帶取代銳利描邊——方向確認，但外輪廓
   仍是最初的 8 點橢圓，沒有真的不規則；頂石凹口一度做成對稱雙峰，
   被使用者笑稱像貓耳朵，已修正凹口深度與兩側高度不對稱。
5. 使用者指出四顆石頭切面模板完全一樣、只是換色，「像同一顆複製四份」
   ——這版讓四顆石頭各自用不同數量的內部頂點與不同的弧段分配邏輯
   （頂石 3 點均分 12 面／中層石 2 點對半 10 面／薄石 3 點但刻意不均分
   12 面／底石 4 點＋四邊形中心對角切 14 面），四顆質感真正不同，不是
   同一套模板換色。
6. 使用者提供兩張參考向量圖（灰階低多邊形石頭示範＋竹子插畫），指出
   正確做法是「切面邊界本身用有機曲線，不是直線幾何」＋「同一顆石頭
   的顏色要收緊在一組相近色調內，不要大範圍明暗跳躍」。頂石先行套用
   確認方向後，這版把中層石／薄石／底石也全部換成二次貝茲曲線切面邊
   （用 curve-facets.mjs 腳本產生，每條邊固定隨機微凸，不是銳利直線），
   並重新選過三顆的色票，範圍收窄到 5-6 個彼此接近的色階。薄石另外依
   使用者要求整體壓扁（原本輪廓高約 54px 壓到約 24px，像變薄的筆記
   本），外輪廓、clip-path、光澤疊層、描邊全部同步改用壓扁後座標。
7. 曲線幅度加大後發現一個渲染 bug：相鄰切面各自獨立算彎曲弧度，共用邊
   對不齊，背景從縫隙透出變成白色裂線；外輪廓的描邊/光澤疊層跟切面本
   身的邊界曲線也各自獨立算，兩者對不齊出現白色縫隙。修法：改用「以邊
   的座標為 key」的雜湊來決定每條共用邊的彎曲量，兩個三角形共用同一條
   邊時算出來的曲線完全相同（curve-facets.mjs／curve-outline-shared.mjs
   統一邏輯）；外輪廓也改用同一套邊雜湊，不再各自獨立。
8. 薄石壓扁＋加大曲線後使用者說看起來像枯葉／木片——兩端收成銳角尖點
   （對稱梭形）加上規律波浪凹刻，讀起來像葉脈。改法：兩端各拆成兩點、
   中間夾一小段近垂直鈍邊（切面數 12→14）；曲線幅度調降到其他三顆的
   0.6 倍；並手動把頂邊其中一段曲線方向反過來，打斷原本規律的單一凸
   弧，變成不規則的上下波動。
（後續使用者一度想改參考另一張圓潤平塗縮圖整個重畫比例/配色，試了一輪
後覺得方向不對，2026-07-14 決定revert回這一版繼續往下走，把重點移到把
竹子＋石頭組合進主 logo 檔。）
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="512"
     height="512"
     viewBox="0 0 512 512"
     role="img"
     aria-labelledby="jonaminz-stacked-stones-title jonaminz-stacked-stones-desc"
     focusable="false"
     data-component="jonaminz-stacked-stones">
  <title id="jonaminz-stacked-stones-title">Jonaminz 平衡疊石</title>
  <desc id="jonaminz-stacked-stones-desc">四顆角度分面的低多邊形石頭由深色底石向上堆疊，輪廓不規則凸凹，各自用不同數量的內部頂點切出大小不一的切面（不是同一套模板換色），切面邊界為有機曲線而非直線，每顆石頭用收緊的相近色階呈現圓潤石面質感，底部有獨立的手繪地面筆觸。</desc>

  <defs>

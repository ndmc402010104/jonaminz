      <stop offset="0" stop-color="#0c0d0a" stop-opacity="0.45"/>
      <stop offset="0.6" stop-color="#0c0d0a" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#0c0d0a" stop-opacity="0"/>
    </radialGradient>
    <filter id="jonaminz-stacked-stones-shadow" x="-18%" y="-24%" width="136%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#161713" flood-opacity="0.2"/>
    </filter>


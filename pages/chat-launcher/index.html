<!doctype html>
<!--
檔案位置：jonaminz/pages/chat-launcher/index.html
用途：Chat「主頁」（/pages/chat/）的攜帶版——全站/跨專案共用的浮動入口
＋懸浮面板本體。自己不決定出現在哪裡——由嵌入端（jonaminz 內部頁面的
assets/js/chat-launcher.js，或外部專案透過 SDK Kernel 的
chat.launcher@1 自動掛載）注入一個 iframe 指到這裡。跟
pages/identity-relay/ 同一個模式：不走 entry-core.js／config.json 的
水庫 bootstrap，極簡、載入速度優先——但這頁跟 identity-relay 不同的是
「會被使用者實際看到並互動」，不是純背景 relay，所以還是載入
02-tokens.css 拿真實視覺 token（不載入 theme-runtime.js／完整 bootstrap，
見同資料夾 CSS 檔頭說明——理由不只是輕量，Chat 是跨專案共用的識別，
不該跟著 jonaminz 自己當下選的 Theme 走）。

2026-07-14（P2）：三態機——收合（只有大頭貼）／半版／全版，交接包
DECISIONS.md／CHAT_SHARED_ARCHITECTURE.md v0.7 定案的模型。

2026-07-14（同日稍晚，重要修正）：使用者在真實 Android 裝置上回報一個
第一版沒抓到根因的 bug——浮動大頭貼「圓形外面卡一個方框」，而且原本
以為是 box-shadow 被裁到（見 CHANGELOG 同日較早條目），實際加大容器
邊距後**在 Android 上依然存在、看起來更怪**。真正原因：iframe 內部的
「透明背景」在這台裝置的瀏覽器／WebView 上不可靠——任何原本該透明、
讓宿主頁面透出來的區域，實際上都被畫成不透明的白色，跟容器邊距大小
無關。

修法：**不再依賴 iframe 內部透明**，改成宿主端（`assets/js/
chat-launcher.js`／`sdk-src/sdk.js`）直接對 `<iframe>` 這個元素本身套
`border-radius`／`box-shadow`——這是瀏覽器對「一般 HTML 元素」的裁形狀
能力，跟這個元素「裡面的文件」透不透明完全無關，是遠比「指望 iframe
內容透明疊在頁面上」更穩固的機制。代價是這個頁面內部**不能再留任何
「本來想讓宿主頁面透出來」的空白區域**——收合態／展開態各自的畫面現在
都完整填滿整個 iframe（0 透明留白），視覺上該有的圓角/陰影全部交給
宿主的 CSS 處理，不是這裡自己畫。

「大頭貼在面板展開時仍然可見、可點擊收合」這條規則（見
CHAT_SHARED_ARCHITECTURE.md v0.6-v0.7）改成：展開視圖裡的右下角（composer
上方留出的淨空，不蓋住送出鍵）有一顆小一號的同一顆大頭貼
（`#miniLauncher`，2026-07-14 稍晚從原本試過的右上角移過來——右上角在
較窄的螢幕上會跟頁首自己的姓名/badge文字疊到，且使用者原本的習慣是
「圓圈一直在螢幕右下角」，右上角不符合預期），跟收合視圖裡佔滿整個
iframe 的大頭貼（`#launcher`）是同一組資料算出來的兩個 DOM，功能一樣
（點了就收合），只是不再是「疊在面板外面的獨立圓形」——因為現在整個
iframe 只有一個裁切形狀，同一時間只能是圓形（收合）或圓角矩形（展開）
兩者之一，不能兩者同時存在。

注意：這頁不走 entry-core.js 的 bootstrap，所以拿不到 version.js 的
cache-buster 機制——如果改完這頁看起來沒生效，先確認是不是瀏覽器/
WebView 快取到舊版本（強制重新整理／清 App 資料），不是改動本身沒
生效。

訊息串/composer 邏輯完全不在這裡重寫——掛
window.JonaminzChatThread（assets/js/chat-thread.js）進 #threadRoot，
跟 /pages/chat/ 主頁共用同一份實作。onUpdate callback 讓兩顆大頭貼
（收合視圖的大顆／展開視圖的迷你顆）同步同一組已算好的資料（對方是
誰／未讀數／在線狀態），不是各自重算一次。

點擊 postMessage 用 "*"：跟 identity-relay 同一個理由——內容只有狀態
字串本身，不含 token，外洩了也不能拿去做任何事。
-->
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="color-scheme" content="light">
<title>jonaminz chat launcher</title>
<link rel="stylesheet" href="/assets/css/reservoir/02-tokens.css">
<link rel="stylesheet" href="/pages/chat-launcher/assets/css/page-chat-launcher.css">
</head>
<body>
<div class="jcl-view jcl-collapsed" id="collapsedView">
  <button type="button" class="jcl-avatar-btn jcl-avatar-btn--big" id="launcher" aria-label="開啟 Chat">
    <span id="avatarTextBig"></span>
    <span class="jcl-presence"></span>
    <span class="jcl-badge" id="badgeBig"></span>
  </button>
</div>
<div class="jcl-view jcl-expanded" id="expandedView" hidden>
  <button type="button" class="jcl-handle" id="handle" aria-label="切換半版／全版"><span></span></button>
  <div class="jcl-thread-root" id="threadRoot"></div>
  <button type="button" class="jcl-avatar-btn jcl-avatar-btn--mini" id="miniLauncher" aria-label="收合 Chat">
    <span id="avatarTextMini"></span>
    <span class="jcl-presence"></span>
    <span class="jcl-badge" id="badgeMini"></span>
  </button>
</div>
<script src="/assets/js/backend-client.js"></script>
<script src="/assets/js/chat-thread.js"></script>
<script>
(function () {
  "use strict";

  var TOKEN_KEY = "jonaminz.sessionToken";
  var STATE_KEY = "jonaminz.chatPanelSize"; // 只記半版/全版偏好，不記收合/展開

  var collapsedView = document.getElementById("collapsedView");
  var expandedView = document.getElementById("expandedView");
  var launcher = document.getElementById("launcher");
  var miniLauncher = document.getElementById("miniLauncher");
  var handle = document.getElementById("handle");
  var threadRoot = document.getElementById("threadRoot");
  var avatarTextBig = document.getElementById("avatarTextBig");
  var avatarTextMini = document.getElementById("avatarTextMini");
  var badgeBig = document.getElementById("badgeBig");
  var badgeMini = document.getElementById("badgeMini");

  var token = null;
  try { token = window.localStorage.getItem(TOKEN_KEY); } catch (error) { token = null; }
  if (!token) return; // 沒登入：兩個 view 都保持 hidden，跟嵌入端的粗篩一致

  var panelState = "collapsed"; // collapsed | half | full
  var expandedSize = "half";
  try {
    var saved = window.localStorage.getItem(STATE_KEY);
    if (saved === "half" || saved === "full") expandedSize = saved;
  } catch (error) {
    // localStorage 不可用就用預設 half，不影響其他功能。
  }

  function postState() {
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(
          { source: "jonaminz-chat-launcher", action: "setState", state: panelState },
          "*"
        );
      }
    } catch (error) {
      // 不燒房子：postMessage 失敗頂多是尺寸沒跟著換，不影響面板本身操作。
    }
  }

  function applyState() {
    var collapsed = panelState === "collapsed";
    collapsedView.hidden = !collapsed;
    expandedView.hidden = collapsed;
    postState();
  }

  launcher.addEventListener("click", function () {
    panelState = expandedSize;
    applyState();
  });
  miniLauncher.addEventListener("click", function () {
    panelState = "collapsed";
    applyState();
  });

  handle.addEventListener("click", function () {
    expandedSize = expandedSize === "half" ? "full" : "half";
    panelState = expandedSize;
    try { window.localStorage.setItem(STATE_KEY, expandedSize); } catch (error) {}
    applyState();
  });

  applyState(); // 立刻通知宿主目前是收合態，避免展開前那瞬間尺寸對不上

  window.JonaminzChatThread.mount(threadRoot, {
    token: token,
    onUpdate: function (state) {
      var initial = state.peerLabel.charAt(0).toUpperCase();
      var label = "開啟與 " + state.peerLabel + " 的 Chat";
      var unreadText = state.unreadCount > 9 ? "9+" : String(state.unreadCount);

      [
        { avatarEl: avatarTextBig, badgeEl: badgeBig, btn: launcher },
        { avatarEl: avatarTextMini, badgeEl: badgeMini, btn: miniLauncher }
      ].forEach(function (pair) {
        pair.avatarEl.textContent = initial;
        pair.badgeEl.textContent = unreadText;
        pair.btn.classList.add("is-visible");
        pair.btn.classList.toggle("is-online", state.isOnline);
        pair.btn.classList.toggle("has-unread", state.unreadCount > 0);
        pair.btn.setAttribute("aria-label", pair.btn === launcher ? label : "收合 Chat");
      });
    }
  });
})();
</script>
</body>
</html>

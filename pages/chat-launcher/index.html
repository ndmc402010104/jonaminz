<!doctype html>
<!--
檔案位置：jonaminz/pages/chat-launcher/index.html
用途：全站/跨專案共用的浮動 Chat 入口——**只有大頭貼本體**，不含面板。
自己不決定出現在哪裡——由嵌入端（jonaminz 內部頁面的
assets/js/chat-launcher.js，或外部專案透過 SDK Kernel 的
chat.launcher@1 自動掛載）注入一個 iframe 指到這裡。跟
pages/identity-relay/ 同一個模式：不走 entry-core.js／config.json 的
水庫 bootstrap，極簡、載入速度優先。

2026-07-14（三次修正後的最終架構，教訓見 CHANGELOG 同日條目）：
1. P2 做完後這裡原本連面板都一起做（一個 iframe 同時管收合/半版/全版
   三態），使用者在真實 Android 裝置上回報「圓形外面卡方框」。
2. 第一次診斷錯誤（以為陰影被裁到），第二次抓到真正原因——那台裝置的
   瀏覽器/WebView 上 iframe 內部透明背景不可靠，改成宿主端直接對
   `<iframe>` 元素套 border-radius/box-shadow（不依賴內部透明，這個
   技巧本身是對的、繼續沿用）。
3. 但「一個 iframe 只能裁一種形狀」逼得大頭貼跟面板擠進同一個 iframe，
   面板展開時只能把大頭貼縮成面板內部一顆「迷你版」——連續兩輪使用者
   實機測試都回報「還是被蓋住」「收不回來」，因為**大頭貼的本質就應該
   是在面板外面的獨立元素，不是塞進面板裡的裝飾**，怎麼調位置都是治標。
4. **這次的修正**：拆成兩個完全獨立的 iframe。這裡（Iframe A）**永遠
   只顯示大頭貼**，不受面板是否展開影響，也不掛 `chat-thread.js`
   （那個要留給下面第 5 點的面板 iframe 專用）——自己起一個很輕量的
   輪詢（每 12 秒問一次 listChatMessages 算 peer/未讀數/在線狀態），
   跟 `chat-thread.js` 的邏輯有小部分重複（算 peer/unreadCount 那幾行），
   是刻意的重複，理由跟 TOKEN_KEY/readToken() 這類小工具在各個 shell
   script/SDK 注入器裡各自維護一份一樣：這批彼此獨立，不互相依賴。
5. 面板本體搬去新頁面 `pages/chat-panel/`（獨立的第二個 iframe，只有
   使用者點這裡的大頭貼之後宿主才會建立它，收合時宿主直接把它移除，
   不是像這次之前那樣自己內部切換 hidden 狀態）。

點擊只 postMessage `{action:"toggle"}` 給宿主——這裡完全不知道面板現在
是不是開著、開著的話是半版還是全版，那些狀態現在都在宿主（負責同時
管理兩個 iframe）跟面板 iframe 自己身上，這裡只負責「大頭貼長什麼樣子
＋通知宿主使用者點了它」，職責單純到不可能再因為跟面板耦合而出這類
bug。

postMessage 用 "*"：跟 identity-relay 同一個理由——內容只有一個固定的
"toggle" 字串，不含 token，外洩了也不能拿去做任何事。
-->
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="color-scheme" content="light">
<title>jonaminz chat launcher</title>
<link rel="stylesheet" href="/assets/css/reservoir/02-tokens.css">
<link rel="stylesheet" href="/pages/chat-launcher/assets/css/page-chat-launcher.css">
</head>
<body>
<button type="button" class="jcl-avatar-btn jcl-avatar-btn--big" id="launcher" aria-label="開啟 Chat">
  <span id="avatarText"></span>
  <span class="jcl-presence"></span>
  <span class="jcl-badge" id="badge"></span>
</button>
<script>
(function () {
  "use strict";

  var TOKEN_KEY = "jonaminz.sessionToken";
  var WORKER_URL = "https://jonaminz-backend.ndmc402010104.workers.dev/api/action";
  var POLL_MS = 12000;
  var PRESENCE_WINDOW_MS = 5 * 60 * 1000;
  var IDENTITY_LABEL = { jonathan: "Jonathan", minz: "Minz" };

  var launcher = document.getElementById("launcher");
  var avatarText = document.getElementById("avatarText");
  var badge = document.getElementById("badge");

  var token = null;
  try { token = window.localStorage.getItem(TOKEN_KEY); } catch (error) { token = null; }
  if (!token) return; // 沒登入：整頁維持看不到大頭貼，跟嵌入端的粗篩一致

  launcher.addEventListener("click", function () {
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ source: "jonaminz-chat-launcher", action: "toggle" }, "*");
      }
    } catch (error) {
      // 不燒房子：postMessage 失敗頂多是面板開不了，不影響大頭貼本身顯示。
    }
  });

  function initialOf(id) {
    var label = IDENTITY_LABEL[id] || id || "?";
    return label.charAt(0).toUpperCase();
  }

  function refresh() {
    fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "listChatMessages", payload: { token: token } })
    })
      .then(function (response) { return response.json(); })
      .then(function (data) {
        if (!data || !data.ok) {
          launcher.classList.remove("is-visible");
          return;
        }
        var identity = data.identity;
        var peer = identity === "jonathan" ? "minz" : "jonathan";
        var peerLabel = IDENTITY_LABEL[peer] || peer;
        var messages = data.messages || [];
        var readState = data.readState || {};
        var myRead = readState[identity] || {};
        var peerRead = readState[peer] || {};

        avatarText.textContent = initialOf(peer);
        launcher.setAttribute("aria-label", "開啟與 " + peerLabel + " 的 Chat");
        launcher.classList.add("is-visible");

        var peerLastActivity = 0;
        messages.forEach(function (m) {
          if (m.sender_identity === peer) {
            var t = new Date(m.created_at).getTime();
            if (t > peerLastActivity) peerLastActivity = t;
          }
        });
        if (peerRead.lastReadAt) {
          var readAt = new Date(peerRead.lastReadAt).getTime();
          if (readAt > peerLastActivity) peerLastActivity = readAt;
        }
        var isOnline = peerLastActivity > 0 && (Date.now() - peerLastActivity) < PRESENCE_WINDOW_MS;
        launcher.classList.toggle("is-online", isOnline);

        var myReadIndex = -1;
        if (myRead.lastReadMessageId) {
          for (var i = 0; i < messages.length; i += 1) {
            if (messages[i].id === myRead.lastReadMessageId) { myReadIndex = i; break; }
          }
        }
        var unreadCount = 0;
        if (myReadIndex >= 0) {
          for (var j = myReadIndex + 1; j < messages.length; j += 1) {
            if (messages[j].sender_identity === peer) unreadCount += 1;
          }
        }
        launcher.classList.toggle("has-unread", unreadCount > 0);
        badge.textContent = unreadCount > 9 ? "9+" : String(unreadCount);
      })
      .catch(function () {
        // 網路失敗：保留上一次的畫面狀態，下一輪 poll 再試。
      });
  }

  refresh();
  setInterval(refresh, POLL_MS);
})();
</script>
</body>
</html>

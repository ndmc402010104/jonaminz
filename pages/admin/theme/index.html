<!DOCTYPE html>
<!--
檔案位置：jonaminz/pages/admin/theme/index.html
用途：後台 Theme 頁（水庫下游頁面，巢狀在 pages/admin/theme/ 底下，
bootstrap 複製自根目錄 index.html，路徑維持根目錄絕對路徑不變）。

這頁目前是 CSS 疊加架構的展示櫃（design token + component 的活文件），
先把一個頁面會用到的所有元素都攤出來看得到、確認 cascade 順序正確；
未來要做成可以拖拉調整顏色/間距的 CSS playground，架構先留在這裡擴充。
-->
<html
  lang="zh-Hant"
  class="jonaminz-loading jonaminz-css-loading jonaminz-shell-loading jonaminz-main-loading"
  data-loading-title="Theme"
  data-jonaminz-page-id="admin-theme"
  data-jonaminz-shell-ready="false"
  data-jonaminz-page-ready="false"
>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Theme - Jonaminz Admin</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/favicon-180.png">

  <script>window.JONAMINZ_SITE_CONFIG_URL = "/config.json";</script>
  <link rel="stylesheet" href="/assets/css/jonaminz-loading.css">
  <script src="/assets/js/entry-core.js"></script>
</head>

<body class="jonaminz-body">
  <header id="header" class="jonaminz-header" data-jonaminz-header></header>

  <main class="jonaminz-page jonaminz-theme-page" data-jonaminz-main>
    <div class="jonaminz-container">
      <a class="jonaminz-theme-back" href="/pages/admin/">&larr; 回後台</a>

      <section class="jonaminz-theme-hero">
        <p class="jonaminz-eyebrow">Jonaminz Admin</p>
        <h1 class="jonaminz-page-title">Theme</h1>
        <p class="jonaminz-page-subtitle">左側選分頁，右側調整該分頁專屬的視覺值；全站基礎 Token 影響所有頁面。</p>
      </section>

      <div class="jonaminz-theme-body" data-app-root>
        <!-- pages/admin/theme/assets/js/app.js 會渲染 token / component 展示區塊 -->
        <p class="jonaminz-page-subtitle" data-app-status>初始化中...</p>
      </div>
    </div>
  </main>

  <footer id="footer" class="jonaminz-footer" data-jonaminz-footer>Footer 載入中...</footer>
</body>
</html>

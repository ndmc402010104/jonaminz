<!DOCTYPE html>
<!--
檔案位置：jonaminz/pages/minz/index.html
用途：Minz 個人門戶頁（水庫下游頁面）。公開頁面，不需要登入。

2026-07-13：從骨架佔位頁改成 Minz Page v0.1 Phase 1（純展示骨架）。
見 docs/minz-page/README.md、AI_CONTEXT/DECISIONS.md §六——完整規格含
後台策展流程、技術方案整合、訪客授權分級，這次只做規格裡「本階段應
完成」列出的公開頁部分，其餘（Phase 2-5）尚未實作。

本頁不使用共用的 [data-jonaminz-header]／[data-jonaminz-footer] 元素
（跟根目錄首頁 index.html 同一個做法，見該檔案開頭註解）——規格要求
桌機右側手帳索引標籤／手機底部固定分類列，跟全站共用的 header/footer
外觀不同，改用本頁自己的 nav + 分類索引，身分登入狀態透過
assets/js/header.js 暴露的 window.JonaminzIdentity.mount() 插入。

分類與展示項目全部由 pages/minz/assets/js/app.js 的 registry 資料渲染
（registry-driven，見該檔案開頭說明），本檔案只放固定不變的頁面骨架
容器，不寫死任何一張分類卡片或收藏項目。
-->
<html
  lang="zh-Hant"
  class="jonaminz-loading jonaminz-css-loading jonaminz-shell-loading jonaminz-main-loading"
  data-loading-title="Minz"
  data-jonaminz-page-id="minz"
  data-jonaminz-shell-ready="false"
  data-jonaminz-page-ready="false"
>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Minz - Jonaminz</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png?v=2">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/favicon-180.png?v=2">

  <script>window.JONAMINZ_SITE_CONFIG_URL = "/config.json";</script>
  <link rel="stylesheet" href="/assets/css/jonaminz-loading.css">
  <script src="/assets/js/entry-core.js"></script>
</head>

<body class="jonaminz-body">
  <div class="minz-page">
    <header class="minz-topbar">
      <a class="minz-brand" href="/">← Minz</a>
      <div class="minz-topbar-links">
        <span class="nav-identity" data-nav-identity></span>
      </div>
    </header>

    <!-- 桌機專用：右側手帳索引標籤，內容由 app.js 依 CATEGORIES registry 產生 -->
    <nav class="minz-tab-index" aria-label="分類索引" data-tab-index></nav>

    <main class="minz-content">
      <section class="minz-hero">
        <div class="minz-hero-photo-placeholder" aria-hidden="true">Minz</div>
        <p class="minz-tagline">歡迎光臨，旅行、好物與想聊的東西，還有一些可愛的小東西。</p>
      </section>

      <section class="minz-latest" id="latest">
        <h2 class="minz-section-title">最新收藏</h2>
        <div class="minz-latest-strip" data-latest-strip></div>
      </section>

      <div data-categories></div>

      <section class="minz-about" id="about">
        <h2 class="minz-section-title">About</h2>
        <p class="minz-about-text">平日是一位藥師，休假時就會四處尋找美食與可愛小物。（示例文字，待提供正式簡介）</p>
      </section>
    </main>

    <!-- 手機專用：底部固定分類列，內容由 app.js 依 CATEGORIES registry 產生 -->
    <nav class="minz-bottom-nav" aria-label="分類導覽" data-bottom-nav></nav>
  </div>
</body>
</html>

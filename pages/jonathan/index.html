<!DOCTYPE html>
<!--
檔案位置：jonaminz/pages/jonathan/index.html
用途：Jonathan（石益昇）公開門戶頁（水庫下游頁面）。公開頁面，不需要登入。

2026-07-13：整份改寫成「Jonathan 公開頁設計與實作規格 v1」第一版（見
docs/jonathan-page/README.md、AI_CONTEXT/DECISIONS.md §七）。這頁不是
登入後共用的 Digital Home，只負責：簡介、SKHPSv2 公開入口、About 連結、
未來作品/收藏/專業成果的可擴充位置（目前沒有內容，完全不渲染，見
app.js CONTENT_ITEMS 說明）。

本頁不使用共用的 [data-jonaminz-header]／[data-jonaminz-footer] 元素
（跟首頁/Minz頁同一個做法），改用自己的極簡導覽＋Footer，身分登入狀態
透過 assets/js/header.js 暴露的 window.JonaminzIdentity.mount() 插入。

右側「精密展示艙」是純 CSS/SVG 建構的抽象視覺（見 page-jonathan.css），
不是真的 SKHPSv2 截圖——完全用幾何色塊/漸層/模糊合成，沒有任何實際
UI 擷圖，天生就不需要額外去識別化。SKHPS 連結沿用既有的
resolveSkhpsUrl()（見 app.js），本機開發連本機 dev server，正式站連
skhps.jonaminz.com，不是寫死同一個網址。
-->
<html
  lang="zh-Hant"
  class="jonaminz-loading jonaminz-css-loading jonaminz-shell-loading jonaminz-main-loading"
  data-loading-title="Jonathan"
  data-jonaminz-page-id="jonathan"
  data-jonaminz-shell-ready="false"
  data-jonaminz-page-ready="false"
>

  <script>window.JONAMINZ_SITE_CONFIG_URL = "/config.json";</script>
  <link rel="stylesheet" href="/assets/css/jonaminz-loading.css">
  <script src="/assets/js/entry-core.js"></script>
</head>

<body class="jonaminz-body">
  <div class="jonathan-page">
    <header class="jonathan-topbar">
      <a class="jonathan-brand" href="/">Jonaminz</a>

          <p class="jonathan-eyebrow">Jonathan</p>

          <div class="jonathan-hero-actions">
            <a class="jonathan-btn jonathan-btn--primary" data-skhps-link href="https://skhps.jonaminz.com">進入 SKHPSv2</a>
            <a class="jonathan-btn jonathan-btn--secondary" href="/pages/jonathan/about/">關於 Jonathan</a>

          <div class="jonathan-pod" data-jonathan-pod>
            <div class="jonathan-pod-ring"></div>
            <div class="jonathan-pod-glass"></div>

            <div class="jonathan-pod-fragment jonathan-pod-fragment--2"><span></span><span></span></div>
          </div>

      <section class="jonathan-items" id="skhpsv2" data-content-root></section>

    <footer class="jonathan-footer">

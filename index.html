<!DOCTYPE html>
<!--
檔案位置：jonaminz/index.html
用途：jonaminz 首頁，水庫本體最小入口模板（改編自 SKHPS 水庫理論，獨立自足，不依賴 skhpsv2）。

水庫法則（jonaminz 版）：
- jonaminz 沒有外部水庫可以依附，本身就是自己的水庫本體。
- 本頁只直接載入：
  1. assets/css/jonaminz-loading.css
  2. assets/js/entry-core.js
- entry-core.js 負責讀 version.js / config.json、套用 loading gate、
  依序疊加 reservoir 六層 CSS + 本頁的 Page Layer CSS（page-home.css，見
  config.json -> pages.home.entry.styles），再載入 header/footer，
  最後依 entry.afterScripts 載入頁面自己的 app.js。
- 頁面本身不直接載 assets/js/app.js、header.js、footer.js、reservoir CSS。
- JONAMINZ_ENTRY_VERSION 只是前端資源 cache buster，不是業務版本。
- 這份首頁設計是簽名式導覽（signature navigation）版型，全螢幕相片 + 兩人
  各自的 name-link + 中間共用入口，不使用舊版 .jonaminz-hero 卡片版型。
-->
<html
  lang="zh-Hant"
  class="jonaminz-loading jonaminz-css-loading jonaminz-shell-loading jonaminz-main-loading"
  data-loading-title="Jonaminz"
  data-jonaminz-page-id="home"
  data-jonaminz-shell-ready="false"
  data-jonaminz-page-ready="false"
>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Jonaminz</title>

  <script>
    (function () {
      "use strict";

      window.JONAMINZ_ENTRY_VERSION = String(Date.now());
      window.JONAMINZ_SITE_CONFIG_URL = "/config.json";

      document.write('<link rel="stylesheet" href="/assets/css/jonaminz-loading.css?v=' + encodeURIComponent(window.JONAMINZ_ENTRY_VERSION) + '">');
      document.write('<script src="/assets/js/entry-core.js?v=' + encodeURIComponent(window.JONAMINZ_ENTRY_VERSION) + '"><\/script>');
    })();
  </script>
</head>

<body class="jonaminz-body">
  <div class="page">
    <div class="photo"></div>

    <nav class="nav">
      <span class="brand">jonaminz</span>
      <div class="nav-links">
        <a href="#jonathan">Jonathan</a>
        <a href="#minz">Minz</a>
        <a class="login" href="/pages/admin/">Login</a>
      </div>
    </nav>

    <div class="line"></div>

    <div class="signature">
      <a id="minz" class="name-link" href="#minz">
        <small>piece 01</small>
        <strong>Minz</strong>
      </a>

      <div class="center">
        <h1>jonaminz</h1>
        <p>Jonathan 與 Minz 的 Digital Home。</p>
        <a class="home-key" href="/pages/admin/">共用入口</a>
      </div>

      <a id="jonathan" class="name-link right" href="#jonathan">
        <small>piece 02</small>
        <strong>Jonathan</strong>
      </a>
    </div>
  </div>
</body>
</html>

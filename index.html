<!DOCTYPE html>
<!--
檔案位置：jonaminz/index.html
用途：jonaminz 首頁，水庫本體最小入口模板（改編自 SKHPS 水庫理論，獨立自足，不依賴 skhpsv2）。

水庫法則（jonaminz 版）：
- jonaminz 沒有外部水庫可以依附，本身就是自己的水庫本體。
- 本頁只直接載入：
  1. assets/css/jonaminz-loading.css
  2. assets/js/entry-core.js
- entry-core.js 負責讀 version.js / config.json、套用 loading gate、
  依序疊加 reservoir 六層 CSS + 本頁的 Page Layer CSS（page-home.css，見
  config.json -> pages.home.entry.styles），再載入 header/footer，
  最後依 entry.afterScripts 載入頁面自己的 app.js。
- 頁面本身不直接載 assets/js/app.js、header.js、footer.js、reservoir CSS。
- JONAMINZ_ENTRY_VERSION 只是前端資源 cache buster，不是業務版本。
- 這份首頁設計是簽名式導覽（signature navigation）版型：小尺寸相片框（非
  全螢幕背景）＋標題置中＋兩人各自的 name-link。2026-07-12 改版：原本是
  全螢幕相片當背景疊文字，橫向構圖的照片在窄螢幕下無論怎麼調
  background-position 都會裁掉其中一人，改成固定 aspect-ratio 的小相片框
  （<img> + object-fit:cover），裁切比例不隨螢幕寬度改變，從根本解決
  RWD 問題，不用再為不同斷點手動調裁切點。同時拿掉右上角跟 Jonathan/Minz
  重複的導覽按鈕（已經有下面的 name-link 可以點）跟沒有實際用途的「共用
  入口」按鈕，首頁只留品牌字、登入、標題、相片、兩個 name-link。
-->
<html
  lang="zh-Hant"
  class="jonaminz-loading jonaminz-css-loading jonaminz-shell-loading jonaminz-main-loading"
  data-loading-title="Jonaminz"
  data-jonaminz-page-id="home"
  data-jonaminz-shell-ready="false"
  data-jonaminz-page-ready="false"
>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Jonaminz</title>

  <script>window.JONAMINZ_SITE_CONFIG_URL = "/config.json";</script>
  <link rel="stylesheet" href="/assets/css/jonaminz-loading.css">
  <link rel="preload" as="image" href="/assets/img/home-hero.jpg">
  <script src="/assets/js/entry-core.js"></script>
</head>

<body class="jonaminz-body">
  <div class="page">
    <nav class="nav">
      <span class="brand">jonaminz</span>
      <div class="nav-links">
        <span class="nav-identity" data-nav-identity></span>
      </div>
    </nav>

    <main class="hero">
      <div class="hero-photo">
        <img src="/assets/img/home-hero.jpg" alt="Jonathan 與 Minz">
      </div>
      <h1>jonaminz</h1>
      <p>Jonathan 與 Minz 的 Digital Home。</p>
    </main>

    <div class="line"></div>

    <div class="signature">
      <a id="minz" class="name-link" href="#minz">
        <strong>Minz</strong>
      </a>

      <a id="jonathan" class="name-link right" href="#jonathan">
        <strong>Jonathan</strong>
      </a>
    </div>
  </div>
</body>
</html>
